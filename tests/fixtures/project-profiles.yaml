defaults:
  output_dir: /tmp/my-project-agents

profiles:
  deepseek:
    invocation: claude-p
    settings: /project/.claude/deepseek.json
    model: deepseek-v4-pro[1m]
    bare: true
    timeout: 120
    mcp_config: []
    allowed_tools: []
    description: DeepSeek project override.

  pplx:
    invocation: cli
    command: pplx
    model: sonar-pro
    stdin: true
    args: [--format, text]
    description: Perplexity project-only profile.
